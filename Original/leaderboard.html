<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Climb the Court — Live Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --grass: #1a6b2e;
  --grass-light: #2d9e47;
  --grass-bright: #3dbd58;
  --accent: #4eff7a;
  --accent2: #b8ff6a;
  --gold: #f0e040;
  --dark: #0a1f0e;
  --dark2: #0f2a14;
  --card: #122b18;
  --text: #e8ffe0;
  --muted: #7aad80;
  --win: #3dbd58;
  --lose: #e05050;
  --stay: #a0a0a0;
  --border: rgba(78,255,122,0.1);
  --grad: linear-gradient(135deg, #b8ff6a 0%, #4eff7a 60%, #2d9e47 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:var(--dark);
  background-image:
    radial-gradient(ellipse at top left,rgba(78,255,122,0.07) 0%,transparent 55%),
    radial-gradient(ellipse at bottom right,rgba(45,158,71,0.10) 0%,transparent 55%),
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(78,255,122,0.015) 40px,rgba(78,255,122,0.015) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 80px,rgba(78,255,122,0.015) 80px,rgba(78,255,122,0.015) 81px);
  background-attachment:fixed;
  color:var(--text);
  font-family:'Outfit',sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* ── HEADER ── */
.lb-header{
  padding:0.75rem 1.5rem 0.6rem;
  background:linear-gradient(135deg,var(--dark2),var(--card));
  border-bottom:2px solid var(--grass-bright);
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:1rem;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.lb-logo{
  font-family:'Bebas Neue',cursive;
  font-size:1.9rem;
  letter-spacing:0.12em;
  background:var(--grad);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}
.lb-logo-sub{
  font-size:0.62rem;
  font-weight:600;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--muted);
  display:block;
}
.lb-status{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:0.5rem;
  font-size:0.72rem;
  color:var(--muted);
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--muted);
  flex-shrink:0;
}

/* ── ROUND NAV ── */
.round-nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.75rem;
  padding:0.45rem 1.5rem;
  background:var(--dark2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.round-nav button{
  background:rgba(78,255,122,0.08);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--accent);
  font-family:'Bebas Neue',cursive;
  font-size:1.2rem;
  width:32px;height:32px;
  cursor:pointer;
  transition:background 0.15s;
  display:flex;align-items:center;justify-content:center;
}
.round-nav button:hover{background:rgba(78,255,122,0.2);}
.round-nav button:disabled{opacity:0.3;cursor:default;}
.round-label{
  font-family:'Bebas Neue',cursive;
  font-size:1.15rem;
  letter-spacing:0.1em;
  color:var(--text);
  min-width:180px;
  text-align:center;
}
.round-status{
  font-size:0.68rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:0.15rem 0.5rem;
  border-radius:4px;
  font-weight:600;
}
.round-status.completed{background:rgba(61,189,88,0.15);color:var(--win);}
.round-status.inprogress{background:rgba(240,224,64,0.15);color:var(--gold);}
.round-status.upcoming{background:rgba(122,173,128,0.1);color:var(--muted);}

/* ── TABS ── */
.lb-tabs{
  display:flex;
  gap:0;
  padding:0 1.5rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--dark2);
}
.lb-tab{
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  color:var(--muted);
  font-family:'Outfit',sans-serif;
  font-weight:600;
  font-size:0.8rem;
  letter-spacing:0.04em;
  padding:0.6rem 1rem;
  cursor:pointer;
  transition:all 0.15s;
  text-transform:uppercase;
  margin-bottom:-1px;
}
.lb-tab:hover{color:var(--accent);}
.lb-tab.active{color:var(--accent);border-bottom-color:var(--grass-bright);}
.tab-spacer{display:inline-block;width:2.5rem;border-right:1px solid var(--border);margin:0 0.25rem;align-self:stretch;}

/* ── CONTENT ── */
.lb-body{flex:1;overflow:hidden;padding:0;display:flex;flex-direction:column;}
.lb-page{display:none;}
.lb-page.active{display:flex;flex-direction:column;width:100%;height:100%;overflow-y:auto;}
.lb-page.active.courts-page{overflow-y:hidden;}

/* ── TABLE ── */
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{
  background:var(--dark2);
  color:var(--muted);
  font-size:0.68rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
  padding:0.55rem 0.9rem;
  text-align:left;
  font-weight:600;
  position:sticky;top:0;z-index:2;
  border-bottom:1px solid var(--border);
}
.lb-table th:not(:first-child){text-align:center;}
.lb-table td{padding:0.65rem 0.9rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.lb-table td:not(:first-child){text-align:center;}
.lb-table tr:hover td{background:rgba(78,255,122,0.03);}

.rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;
  font-family:'Bebas Neue',cursive;font-size:1.05rem;
}
.rank-1{background:linear-gradient(135deg,#f0e040,#e6a817);color:#0a1f0e;}
.rank-2{background:#a8a9ad;color:#0a1f0e;}
.rank-3{background:#ad7b4b;color:#fff;}
.rank-n{background:transparent;color:var(--muted);border:1px solid var(--border);}

.badge-court{
  font-family:'Bebas Neue',cursive;
  font-size:0.82rem;
  background:rgba(78,255,122,0.1);
  color:var(--accent);
  border:1px solid var(--border);
  border-radius:4px;
  padding:0.1rem 0.45rem;
  letter-spacing:0.05em;
}

/* Movement */
.move-up{color:#4eff7a;font-size:1rem;}
.move-down{color:#e05050;font-size:1rem;}
.move-stay{color:#a0a0a0;font-size:1rem;}
.move-tbd{color:#7aad80;font-size:0.8rem;}

/* ── COURTS VIEW ── */
.courts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(310px,1fr));
  gap:0.85rem;
  padding:1rem 1.5rem;
  width:100%;
  box-sizing:border-box;
  align-content:stretch;
}
.court-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:clamp(6px, calc(0.8vw / var(--cols,4)), 14px);
  overflow:hidden;
  display:flex;
  flex-direction:column;
  /* base font scales with card width: bigger when fewer cols */
  font-size:calc(4.2vw / var(--cols,4));
}
.court-card-hdr{
  background:linear-gradient(135deg,var(--grass),var(--grass-light));
  padding:0.35em 0.7em;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.court-card-hdr.gold{background:linear-gradient(135deg,#8b7700,#b8a000);}
.court-name{font-family:'Bebas Neue',cursive;font-size:1.3em;color:#fff;letter-spacing:0.06em;line-height:1;}
.court-body{flex:1;padding:0.5em 0.7em;display:flex;flex-direction:column;justify-content:space-around;}
.team-row{
  display:flex;align-items:center;gap:0.4em;
  padding:0.25em 0;
  border-bottom:1px solid var(--border);
  flex:1;
}
.team-row:last-child{border-bottom:none;}
.team-name{font-weight:700;font-size:1em;flex:1;line-height:1.1;}
.team-players{font-size:0.7em;color:rgba(255,255,255,0.75);font-weight:600;margin-top:0.2em;line-height:1.3;}
.team-total{font-family:'Bebas Neue',cursive;font-size:1.9em;color:var(--accent);line-height:1;}

.no-data{
  padding:2rem;
  text-align:center;
  color:var(--muted);
  font-size:0.9rem;
  line-height:1.7;
}

/* ── Confetti ──────────────────────────────────────────────────────────── */
.court-card{ position:relative; }
.confetti-wrap{
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none; overflow:hidden; z-index:2;
}
.confetti-p{
  position:absolute; top:-8%; border-radius:2px; opacity:0;
  animation: confetti-fall linear infinite;
}
@keyframes confetti-fall{
  0%   { top:-8%; opacity:1; transform-origin:center; }
  10%  { opacity:1; }
  85%  { opacity:0.7; }
  100% { top:108%; opacity:0; }
}
.team-row.winner-row{
  background: rgba(255,215,0,0.08);
  border-radius: 6px;
  position:relative;
  overflow:hidden;
}
</style>
</head>
<body>

<div class="lb-header">
  <span style="font-size:1.5rem;filter:drop-shadow(0 0 6px rgba(78,255,122,0.5))">🎾</span>
  <div>
    <div class="lb-logo">Climb the Court</div>
    <span class="lb-logo-sub">Live Leaderboard</span>
  </div>
  <div class="lb-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</div>

<!-- Round Navigation -->
<div class="round-nav" id="round-nav" style="display:none">
  <button id="btn-prev" onclick="changeRound(-1)">&#8592;</button>
  <span class="round-label" id="round-label">—</span>
  <span class="round-status" id="round-status-badge"></span>
  <button id="btn-next" onclick="changeRound(1)">&#8594;</button>
</div>

<div class="lb-tabs">
  <button class="lb-tab active" onclick="switchTab(1,this)">Climb the Court</button>
  <button class="lb-tab" onclick="switchTab(2,this)">Courts</button>
  <button class="lb-tab" onclick="switchTab(3,this)">Results</button>
  <span class="tab-spacer"></span>
  <button class="lb-tab" onclick="switchTab(4,this)">Round (Players)</button>
  <button class="lb-tab" onclick="switchTab(5,this)">Round (Teams)</button>
  <span class="tab-spacer"></span>
  <button class="lb-tab" onclick="switchTab(6,this)">Overall (Players)</button>
  <button class="lb-tab" onclick="switchTab(7,this)">Overall (Teams)</button>
</div>

<div class="lb-body">
  <div class="lb-page active" id="p1">
    <table class="lb-table">
      <thead><tr>
        <th style="width:36px">#</th>
        <th>Team</th>
        <th>Players</th>
        <th>W</th><th>L</th>
        <th id="th-court">Court</th>
        <th id="th-move">Move</th>
        <th id="th-next">Next</th>
        <th>Score</th>
      </tr></thead>
      <tbody id="tbody-standings">
        <!-- rows injected by JS -->
      </tbody>
    </table>
  </div>

  <div class="lb-page" id="p2">
    <div class="courts-grid" id="courts-view" style="flex:1;align-content:start"></div>
  </div>

  <div class="lb-page courts-page" id="p3">
    <table class="lb-table">
      <thead><tr>
        <th>Court</th>
        <th>Winner</th>
        <th>Loser</th>
        <th>Score</th>
      </tr></thead>
      <tbody id="tbody-results"></tbody>
    </table>
  </div>

  <div class="lb-page" id="p4">
    <!-- Players tab — rendered by JS -->
  </div>

  <div class="lb-page" id="p5">
    <!-- Round Teams tab — rendered by JS -->
  </div>

  <div class="lb-page" id="p6">
    <!-- Overall Players tab — rendered by JS -->
  </div>

  <div class="lb-page" id="p7">
    <!-- Overall Teams tab — rendered by JS -->
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const CTC_KEY = 'ctc_live';
let S = null;           // full tournament state
let selectedRoundIdx = 0; // index into matchRounds array
let matchRounds = [];     // only 'match' type rounds (seeding excluded from round nav)
let allRounds = [];       // all rounds
let activeTab = 1;

// ── Utilities ──────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(ok, msg) {
  document.getElementById('status-dot').style.background = ok ? 'var(--win)' : 'var(--lose)';
  document.getElementById('status-text').textContent = msg;
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(n, el) {
  document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  [1,2,3,4,5,6,7].forEach(i => document.getElementById('p'+i).classList.toggle('active', n===i));
  activeTab = n;
  if (n === 4) renderPlayersTab();
  if (n === 5) renderTeamsTab();
  if (n === 6) renderOverallPlayersTab();
  if (n === 7) renderOverallTeamsTab();
}

// ── Round navigation ───────────────────────────────────────────────────────
function changeRound(delta) {
  selectedRoundIdx = Math.max(0, Math.min(matchRounds.length - 1, selectedRoundIdx + delta));
  renderAll();
}

function updateRoundNav() {
  if (!S || matchRounds.length === 0) {
    document.getElementById('round-nav').style.display = 'none';
    return;
  }
  document.getElementById('round-nav').style.display = 'flex';

  const r = matchRounds[selectedRoundIdx];
  const seedCount = matchRounds.filter(x => x.type === 'seeding').length;
  const matchIdx = r.type === 'seeding' ? null : (selectedRoundIdx - seedCount + 1);
  const roundLabel = r.type === 'seeding' ? 'Seeding Round'
    : (r.label || ('Round ' + matchIdx));
  const navLabel = roundLabel + '  (' + (selectedRoundIdx + 1) + ' of ' + matchRounds.length + ')';
  document.getElementById('round-label').textContent = navLabel;

  const badge = document.getElementById('round-status-badge');
  if (r.completed) {
    badge.textContent = '✓ Completed';
    badge.className = 'round-status completed';
  } else {
    // check if any score entered
    const hasScores = r.fixtures && r.fixtures.some(f =>
      f.scores && (f.scores.p1a !== '' || f.scores.p2a !== '')
    );
    badge.textContent = hasScores ? '⏳ In Progress' : 'Upcoming';
    badge.className = 'round-status ' + (hasScores ? 'inprogress' : 'upcoming');
  }

  document.getElementById('btn-prev').disabled = (selectedRoundIdx === 0);
  document.getElementById('btn-next').disabled = (selectedRoundIdx === matchRounds.length - 1);
}

// ── Team court in a given match round ─────────────────────────────────────
function teamCourtInRound(teamId, round) {
  if (!round) return null;
  // Seeding round stores court data in courtAssignments, not fixtures
  if (round.type === 'seeding' && round.courtAssignments) {
    for (const ca of round.courtAssignments) {
      if (ca.team1id === teamId || ca.team2id === teamId) return ca.courtNum;
    }
  }
  if (!round.fixtures) return null;
  for (const f of round.fixtures) {
    if (f.team1id === teamId || f.team2id === teamId) return f.courtNum ?? null;
  }
  return null;
}

// ── Movement arrow ─────────────────────────────────────────────────────────
function movementArrow(curCourt, prevCourt) {
  if (prevCourt === null) return '<span class="move-tbd">❓</span>';
  if (curCourt < prevCourt) return '<span class="move-up">🔼</span>';
  if (curCourt > prevCourt) return '<span class="move-down">🔽</span>';
  return '<span class="move-stay">⏸️</span>';
}

// ── Standings ──────────────────────────────────────────────────────────────
const ORDINALS = ['1st','2nd','3rd','4th','5th','6th','7th','8th','9th','10th',
                  '11th','12th','13th','14th','15th','16th','17th','18th','19th','20th'];

function isFinalRound(r) {
  return r && r.type === 'match' && S.numRounds && r.roundNum >= S.numRounds;
}

function computeStandingsUpTo(roundIdx) {
  const numCourts = S.numPlayers / 4;
  const stats = S.teams.map((t, i) => ({
    tid: i,
    wins: 0,
    losses: 0,
    totalScore: 0,
    court: numCourts, // default = bottom court
    finalPos: null
  }));

  matchRounds.forEach((r, idx) => {
    if (idx > roundIdx) return;  // only up to selected round
    if (!r.completed) return;
    if (r.type === 'seeding') return; // seeding doesn't count wins/losses
    r.fixtures.forEach(f => {
      if (!f.result) return;
      const wi = stats.findIndex(x => x.tid === f.result.winner);
      const li = stats.findIndex(x => x.tid === f.result.loser);

      if (wi >= 0) {
        stats[wi].wins++;
        stats[wi].court = f.courtNum;
      }
      if (li >= 0) {
        stats[li].losses++;
        stats[li].court = f.courtNum;
      }

      const addScore = (tid, a, b) => {
        const st = stats.find(x => x.tid === tid);
        if (st) st.totalScore += (parseInt(a)||0) + (parseInt(b)||0);
      };
      addScore(f.team1id, f.scores.p1a, f.scores.p1b);
      addScore(f.team2id, f.scores.p2a, f.scores.p2b);
    });
  });

  // For the final round, assign exact final positions (mirrors index.html renderLB)
  const curRound = matchRounds[roundIdx];
  if (isFinalRound(curRound) && curRound.completed) {
    curRound.fixtures.forEach(f => {
      if (!f.result) return;
      const w = stats.find(x => x.tid === f.result.winner);
      const l = stats.find(x => x.tid === f.result.loser);
      if (w) w.finalPos = (f.courtNum - 1) * 2 + 1;
      if (l) l.finalPos = (f.courtNum - 1) * 2 + 2;
    });
    stats.sort((a, b) => (a.finalPos || 999) - (b.finalPos || 999));
  } else {
    stats.sort((a, b) => a.court - b.court || b.wins - a.wins || b.totalScore - a.totalScore);
  }
  return stats;
}

function renderStandings() {
  const roundIdx = selectedRoundIdx;
  const curRound = matchRounds[roundIdx];

  // If seeding round selected, show seeding-specific table
  if (curRound && curRound.type === 'seeding') {
    renderSeedingStandings(curRound);
    return;
  }

  const finalRound = isFinalRound(curRound);
  const stats = computeStandingsUpTo(roundIdx);

  // Update column headers dynamically for final round
  const thCourt  = document.getElementById('th-court');
  const thMove   = document.getElementById('th-move');
  const thNext   = document.getElementById('th-next');
  if (thCourt) thCourt.textContent = finalRound ? 'Position' : 'Court';
  if (thMove)  thMove.textContent  = finalRound ? 'Result'   : 'Move';
  if (thNext)  thNext.textContent  = finalRound ? 'Place'    : 'Next';

  let html = '';
  stats.forEach((st, i) => {
    const rank = i + 1;
    const cls = rank <= 3 ? 'rank-' + rank : 'rank-n';
    const t = S.teams[st.tid];
    const p1 = S.players[t.p1id];
    const p2 = S.players[t.p2id];

    // Court: show actual court from the selected round's fixtures
    const curCourt = teamCourtInRound(st.tid, curRound) || st.court;

    // Individual scores for this round's fixture
    let p1score = null, p2score = null;
    if (curRound && curRound.fixtures) {
      const fix = curRound.fixtures.find(f => f.team1id === st.tid || f.team2id === st.tid);
      if (fix) {
        const isT1 = fix.team1id === st.tid;
        const sa = isT1 ? fix.scores.p1a : fix.scores.p2a;
        const sb = isT1 ? fix.scores.p1b : fix.scores.p2b;
        if (sa !== '' || sb !== '') { p1score = parseInt(sa)||0; p2score = parseInt(sb)||0; }
      }
    }
    const p1cell = esc(p1.name) + (p1score !== null ? ` <span style="color:var(--gold);font-weight:700;font-size:0.85em">(${p1score})</span>` : '');
    const p2cell = esc(p2.name) + (p2score !== null ? ` <span style="color:var(--gold);font-weight:700;font-size:0.85em">(${p2score})</span>` : '');

    let courtCell, moveCell, nextCell;

    if (finalRound) {
      // ── Final round: show placement positions ──
      const fix = curRound && curRound.fixtures
        ? curRound.fixtures.find(f => f.team1id === st.tid || f.team2id === st.tid)
        : null;
      if (fix && fix.result) {
        const isWinner = fix.result.winner === st.tid;
        const posNum = (fix.courtNum - 1) * 2 + (isWinner ? 1 : 2);
        const ordinal = ORDINALS[posNum - 1] || posNum + 'th';
        const medal = posNum === 1 ? '🥇' : posNum === 2 ? '🥈' : posNum === 3 ? '🥉' : '🏅';
        const posColor = isWinner ? 'var(--win)' : 'var(--lose)';
        courtCell = `<span class="badge-court">C${fix.courtNum}</span>`;
        moveCell  = isWinner
          ? '<span class="move-up">🏆</span>'
          : '<span class="move-down">🔽</span>';
        nextCell  = `<span style="color:${posColor};font-weight:700;white-space:nowrap">${medal} ${ordinal}</span>`;
      } else {
        // Result not yet confirmed for this team
        courtCell = curCourt ? `<span class="badge-court">C${curCourt}</span>` : '<span style="color:var(--muted)">—</span>';
        moveCell  = '<span class="move-tbd">❓</span>';
        nextCell  = '<span style="color:var(--muted)">TBD</span>';
      }
    } else {
      // ── Regular round: show movement ──
      courtCell = `<span class="badge-court">C${curCourt}</span>`;
      moveCell  = '<span class="move-tbd">❓</span>';
      nextCell  = '<span style="color:var(--muted)">—</span>';
      if (curRound && curRound.type === 'match') {
        const numCourts = S.numPlayers / 4;
        const fix = curRound.fixtures
          ? curRound.fixtures.find(f => f.team1id === st.tid || f.team2id === st.tid)
          : null;
        if (fix && fix.result) {
          const isWinner = fix.result.winner === st.tid;
          const fc = fix.courtNum;
          if (isWinner) {
            const next = Math.max(1, fc - 1);
            moveCell  = next < fc ? '<span class="move-up">🔼</span>' : '<span class="move-stay">⏸️</span>';
            nextCell  = `<span class="badge-court">C${next}</span>`;
          } else {
            const next = Math.min(numCourts, fc + 1);
            moveCell  = next > fc ? '<span class="move-down">🔽</span>' : '<span class="move-stay">⏸️</span>';
            nextCell  = `<span class="badge-court">C${next}</span>`;
          }
        }
      }
    }

    html += `<tr>
      <td><span class="rank-badge ${cls}">${rank}</span></td>
      <td><strong>${esc(t.name)}</strong></td>
      <td style="font-size:1rem;color:#fff;font-weight:700">${p1cell} <span style="color:var(--muted)">&amp;</span> ${p2cell}</td>
      <td><span style="color:var(--win);font-weight:700">${st.wins}</span></td>
      <td><span style="color:var(--lose)">${st.losses}</span></td>
      <td>${courtCell}</td>
      <td>${moveCell}</td>
      <td>${nextCell}</td>
      <td style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--accent)">${st.totalScore}</td>
    </tr>`;
  });

  document.getElementById('tbody-standings').innerHTML = html ||
    '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:1.5rem">No completed rounds yet</td></tr>';
}

// Returns the best column count for N courts to fill the screen
function optimalCols(n) {
  if (n <= 1) return 1;
  if (n <= 2) return 2;
  if (n <= 3) return 3;
  if (n <= 4) return 2;   // 2×2
  if (n <= 6) return 3;   // 2×3
  if (n <= 8) return 4;   // 2×4
  if (n <= 9) return 3;   // 3×3
  if (n <= 12) return 4;  // 3×4
  if (n <= 16) return 4;  // 4×4
  return Math.ceil(Math.sqrt(n));
}

function applyOptimalGrid(el, n) {
  const cols = optimalCols(n);
  el.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
  el.style.alignContent = 'stretch';
  el.style.height = '100%';
  // Pass cols to CSS so font sizes scale correctly
  el.style.setProperty('--cols', cols);
}

// ── Confetti ─────────────────────────────────────────────────────────────
const CONF_COLORS = ['#FFD700','#FF4D4D','#4FC3F7','#69F0AE','#FF8A65','#CE93D8','#FFFFFF','#FFEB3B'];
function launchConfetti(cardEl) {
  const wrap = document.createElement('div');
  wrap.className = 'confetti-wrap';
  cardEl.appendChild(wrap);
  const count = 45;
  for (let i = 0; i < count; i++) {
    const p = document.createElement('span');
    p.className = 'confetti-p';
    const color  = CONF_COLORS[Math.floor(Math.random() * CONF_COLORS.length)];
    const left   = (Math.random() * 110 - 5).toFixed(1);
    const delay  = (Math.random() * 3).toFixed(2);
    const dur    = (2.2 + Math.random() * 2.5).toFixed(2);
    const w      = (4 + Math.random() * 7).toFixed(1);
    const h      = (w * (0.4 + Math.random() * 0.4)).toFixed(1);
    const rot    = Math.floor(Math.random() * 360);
    const rotSpd = (Math.random() > 0.5 ? 1 : -1) * Math.floor(100 + Math.random() * 300);
    p.style.cssText = `left:${left}%;width:${w}px;height:${h}px;background:${color};`
                    + `animation-delay:${delay}s;animation-duration:${dur}s;`
                    + `transform:rotate(${rot}deg);`
                    + `animation-timing-function:cubic-bezier(0.25,0.46,0.45,0.94);`;
    wrap.appendChild(p);
  }
}

// ── Players Tab (for selected round) ──────────────────────────────────────
function renderPlayersTab() {
  if (!S || !S.launched) {
    document.getElementById('p4').innerHTML = '<div class="no-data">No active tournament</div>';
    return;
  }
  const round = matchRounds[selectedRoundIdx];
  const stats = {};
  (S.players || []).forEach(p => {
    if (p && p.id !== undefined) stats[p.id] = { pid: p.id, wins: 0, losses: 0, totalScore: 0 };
  });
  const fixtures = round ? (round.fixtures || []) : [];
  fixtures.forEach(fix => {
    const sc = fix.scores || {};
    const t1 = S.teams[fix.team1id];
    const t2 = S.teams[fix.team2id];
    if (!t1 || !t2) return;
    if (sc.p1a !== '' && sc.p1a !== undefined && stats[t1.p1id] !== undefined)
      stats[t1.p1id].totalScore += parseInt(sc.p1a) || 0;
    if (sc.p1b !== '' && sc.p1b !== undefined && stats[t1.p2id] !== undefined)
      stats[t1.p2id].totalScore += parseInt(sc.p1b) || 0;
    if (sc.p2a !== '' && sc.p2a !== undefined && stats[t2.p1id] !== undefined)
      stats[t2.p1id].totalScore += parseInt(sc.p2a) || 0;
    if (sc.p2b !== '' && sc.p2b !== undefined && stats[t2.p2id] !== undefined)
      stats[t2.p2id].totalScore += parseInt(sc.p2b) || 0;
    if (fix.result) {
      const winTeam = S.teams[fix.result.winner];
      const loseTeam = S.teams[fix.result.loser];
      if (winTeam) {
        if (stats[winTeam.p1id] !== undefined) stats[winTeam.p1id].wins++;
        if (stats[winTeam.p2id] !== undefined) stats[winTeam.p2id].wins++;
      }
      if (loseTeam) {
        if (stats[loseTeam.p1id] !== undefined) stats[loseTeam.p1id].losses++;
        if (stats[loseTeam.p2id] !== undefined) stats[loseTeam.p2id].losses++;
      }
    }
  });
  const rows = Object.values(stats).sort((a, b) => b.totalScore - a.totalScore || b.wins - a.wins || a.losses - b.losses);
  let h = '<table class="lb-table"><thead><tr>';
  h += '<th style="width:36px">#</th><th>Player</th><th>Team</th><th>W</th><th>L</th><th>Score</th>';
  h += '</tr></thead><tbody>';
  rows.forEach((ps, i) => {
    const rank = i + 1;
    const cls = rank <= 3 ? 'rank-' + rank : 'rank-n';
    const p = S.players[ps.pid];
    const team = S.teams.find(t => t.p1id === ps.pid || t.p2id === ps.pid);
    h += `<tr>
      <td><span class="rank-badge ${cls}">${rank}</span></td>
      <td><strong>${esc(p ? p.name : '?')}</strong></td>
      <td style="font-size:0.85rem;color:var(--muted)">${esc(team ? team.name : '?')}</td>
      <td><span style="color:var(--win);font-weight:700">${ps.wins}</span></td>
      <td><span style="color:var(--lose)">${ps.losses}</span></td>
      <td style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--accent)">${ps.totalScore}</td>
    </tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('p4').innerHTML = h;
}

      <td><span class="rank-badge ${cls}">${rank}</span></td>
      <td><strong>${esc(t.name)}</strong></td>
      <td style="font-size:0.8rem;color:var(--muted)">${esc(p1 ? p1.name : '?')} &amp; ${esc(p2 ? p2.name : '?')}</td>
      <td><span style="color:var(--win);font-weight:700">${s.wins}</span></td>
      <td><span style="color:var(--lose)">${s.losses}</span></td>
      <td style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--accent)">${s.totalScore}</td>
    </tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('p5').innerHTML = h;
}

// ── Overall Players Tab (all played rounds) ────────────────────────────────
function renderOverallPlayersTab() {
  if (!S || !S.launched) {
    document.getElementById('p6').innerHTML = '<div class="no-data">No active tournament</div>';
    return;
  }
  const stats = {};
  (S.players || []).forEach((p, i) => {
    if (p && p.id !== undefined) stats[p.id] = { pid: p.id, wins: 0, losses: 0, totalScore: 0 };
  });
  (matchRounds || []).forEach(round => {
    if (!round) return;
    (round.fixtures || []).forEach(fix => {
      const sc = fix.scores || {};
      const t1 = S.teams[fix.team1id];
      const t2 = S.teams[fix.team2id];
      if (!t1 || !t2) return;
      if (sc.p1a !== '' && sc.p1a !== undefined && stats[t1.p1id] !== undefined)
        stats[t1.p1id].totalScore += parseInt(sc.p1a) || 0;
      if (sc.p1b !== '' && sc.p1b !== undefined && stats[t1.p2id] !== undefined)
        stats[t1.p2id].totalScore += parseInt(sc.p1b) || 0;
      if (sc.p2a !== '' && sc.p2a !== undefined && stats[t2.p1id] !== undefined)
        stats[t2.p1id].totalScore += parseInt(sc.p2a) || 0;
      if (sc.p2b !== '' && sc.p2b !== undefined && stats[t2.p2id] !== undefined)
        stats[t2.p2id].totalScore += parseInt(sc.p2b) || 0;
      if (fix.result) {
        const winTeam = S.teams[fix.result.winner];
        const loseTeam = S.teams[fix.result.loser];
        if (winTeam) {
          if (stats[winTeam.p1id] !== undefined) stats[winTeam.p1id].wins++;
          if (stats[winTeam.p2id] !== undefined) stats[winTeam.p2id].wins++;
        }
        if (loseTeam) {
          if (stats[loseTeam.p1id] !== undefined) stats[loseTeam.p1id].losses++;
          if (stats[loseTeam.p2id] !== undefined) stats[loseTeam.p2id].losses++;
        }
      }
    });
  });
  const rows = Object.values(stats).sort((a, b) => b.totalScore - a.totalScore || b.wins - a.wins || a.losses - b.losses);
  let h = '<table class="lb-table"><thead><tr>';
  h += '<th style="width:36px">#</th><th>Player</th><th>Team</th><th>W</th><th>L</th><th>Score</th>';
  h += '</tr></thead><tbody>';
  rows.forEach((ps, i) => {
    const rank = i + 1;
    const cls = rank <= 3 ? 'rank-' + rank : 'rank-n';
    const p = S.players[ps.pid];
    const team = S.teams.find(t => t.p1id === ps.pid || t.p2id === ps.pid);
    h += `<tr>
      <td><span class="rank-badge ${cls}">${rank}</span></td>
      <td><strong>${esc(p ? p.name : '?')}</strong></td>
      <td style="font-size:0.85rem;color:var(--muted)">${esc(team ? team.name : '?')}</td>
      <td><span style="color:var(--win);font-weight:700">${ps.wins}</span></td>
      <td><span style="color:var(--lose)">${ps.losses}</span></td>
      <td style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--accent)">${ps.totalScore}</td>
    </tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('p6').innerHTML = h;
}

// ── Overall Teams Tab (all played rounds) ──────────────────────────────────
function renderOverallTeamsTab() {
  if (!S || !S.launched) {
    document.getElementById('p7').innerHTML = '<div class="no-data">No active tournament</div>';
    return;
  }
  const stats = S.teams.map((t, i) => ({ tid: i, wins: 0, losses: 0, totalScore: 0 }));
  (matchRounds || []).forEach(round => {
    if (!round) return;
    (round.fixtures || []).forEach(fix => {
      const sc = fix.scores || {};
      const s1 = stats.find(s => s.tid === fix.team1id);
      const s2 = stats.find(s => s.tid === fix.team2id);
      if (s1) s1.totalScore += (parseInt(sc.p1a) || 0) + (parseInt(sc.p1b) || 0);
      if (s2) s2.totalScore += (parseInt(sc.p2a) || 0) + (parseInt(sc.p2b) || 0);
      if (fix.result) {
        const sw = stats.find(s => s.tid === fix.result.winner);
        const sl = stats.find(s => s.tid === fix.result.loser);
        if (sw) sw.wins++;
        if (sl) sl.losses++;
      }
    });
  });
  stats.sort((a, b) => b.totalScore - a.totalScore || b.wins - a.wins || a.losses - b.losses);
  let h = '<table class="lb-table"><thead><tr>';
  h += '<th style="width:36px">#</th><th>Team</th><th>Players</th><th>W</th><th>L</th><th>Score</th>';
  h += '</tr></thead><tbody>';
  stats.forEach((s, i) => {
    const rank = i + 1, cls = rank <= 3 ? 'rank-' + rank : 'rank-n';
    const t = S.teams[s.tid], p1 = S.players[t.p1id], p2 = S.players[t.p2id];
    h += `<tr>
      <td><span class="rank-badge ${cls}">${rank}</span></td>
      <td><strong>${esc(t.name)}</strong></td>
      <td style="font-size:0.8rem;color:var(--muted)">${esc(p1 ? p1.name : '?')} &amp; ${esc(p2 ? p2.name : '?')}</td>
      <td><span style="color:var(--win);font-weight:700">${s.wins}</span></td>
      <td><span style="color:var(--lose)">${s.losses}</span></td>
      <td style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--accent)">${s.totalScore}</td>
    </tr>`;
  });
  h += '</tbody></table>';
  document.getElementById('p7').innerHTML = h;
}

// ── Master render ──────────────────────────────────────────────────────────
function renderAll() {
  if (!S || !S.launched) return;
  updateRoundNav();
  renderStandings();
  renderCourts();
  renderResults();
  if (activeTab === 4) renderPlayersTab();
  if (activeTab === 5) renderTeamsTab();
  if (activeTab === 6) renderOverallPlayersTab();
  if (activeTab === 7) renderOverallTeamsTab();
}

// ── Data loading ───────────────────────────────────────────────────────────
function applyState(state) {
  if (!state || !state.launched) {
    setStatus(false, 'No active tournament');
    return;
  }
  S = state;

  // Build rounds list (include seeding as round 0 if present)
  allRounds = S.rounds || [];
  const seedingRounds = allRounds.filter(r => r.type === 'seeding');
  const onlyMatchRounds = allRounds.filter(r => r.type === 'match');
  matchRounds = [...seedingRounds, ...onlyMatchRounds];

  // Auto-select most recent started round
  let autoIdx = 0;
  matchRounds.forEach((r, i) => {
    const hasData = r.completed || (r.fixtures && r.fixtures.some(f =>
      f.scores && (f.scores.p1a !== '' || f.scores.p2a !== '')
    ));
    if (hasData) autoIdx = i;
  });

  // Only auto-advance if we haven't manually selected
  if (!window._roundPinned) selectedRoundIdx = autoIdx;

  renderAll();
  setStatus(true, 'Live · ' + new Date().toLocaleTimeString());
}

// Broadcast Channel listener
const _bc = new BroadcastChannel('ctc_live');
_bc.onmessage = e => {
  if (e.data && e.data.type === 'state_update') applyState(e.data.state);
};

// Initial load from localStorage
function loadFromStorage() {
  try {
    const raw = localStorage.getItem('ctc_live');
    if (raw) applyState(JSON.parse(raw));
    else setStatus(false, 'Waiting for tournament data — open index.html first');
  } catch(e) {
    setStatus(false, 'Error reading data');
  }
}

// Override changeRound to pin selection
const _origChange = changeRound;
window.changeRound = function(delta) {
  window._roundPinned = true;
  selectedRoundIdx = Math.max(0, Math.min(matchRounds.length - 1, selectedRoundIdx + delta));
  renderAll();
};

loadFromStorage();
// Fallback poll every 3 seconds
setInterval(() => {
  const raw = localStorage.getItem('ctc_live');
  if (raw) { try { applyState(JSON.parse(raw)); } catch(e){} }
}, 3000);
</script>
