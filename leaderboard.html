<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Climb the Court — Live Leaderboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --grass: #1a6b2e;
  --grass-light: #2d9e47;
  --grass-bright: #3dbd58;
  --accent: #4eff7a;
  --accent2: #b8ff6a;
  --gold: #f0e040;
  --dark: #0a1f0e;
  --dark2: #0f2a14;
  --card: #122b18;
  --text: #e8ffe0;
  --muted: #7aad80;
  --win: #3dbd58;
  --lose: #e05050;
  --stay: #a0a0a0;
  --border: rgba(78,255,122,0.1);
  --grad: linear-gradient(135deg, #b8ff6a 0%, #4eff7a 60%, #2d9e47 100%);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  background:var(--dark);
  background-image:
    radial-gradient(ellipse at top left,rgba(78,255,122,0.08) 0%,transparent 55%),
    radial-gradient(ellipse at bottom right,rgba(45,158,71,0.10) 0%,transparent 55%);
  color:var(--text);
  font-family:'Outfit',sans-serif;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden;
}

/* ── HEADER ── */
.lb-header{
  padding:0.75rem 1.5rem 0.6rem;
  background:linear-gradient(135deg,var(--dark2),var(--card));
  border-bottom:2px solid var(--grass-bright);
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:1rem;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
}
.lb-logo{
  font-family:'Bebas Neue',cursive;
  font-size:1.9rem;
  letter-spacing:0.12em;
  background:var(--grad);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1;
}
.lb-logo-sub{
  font-size:0.62rem;
  font-weight:600;
  letter-spacing:0.22em;
  text-transform:uppercase;
  color:var(--muted);
  display:block;
}
.lb-status{
  margin-left:auto;
  display:flex;
  align-items:center;
  gap:0.5rem;
  font-size:0.72rem;
  color:var(--muted);
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--muted);
  flex-shrink:0;
}

/* ── ROUND NAV ── */
.round-nav{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:0.75rem;
  padding:0.45rem 1.5rem;
  background:var(--dark2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.round-nav button{
  background:rgba(78,255,122,0.08);
  border:1px solid var(--border);
  border-radius:6px;
  color:var(--accent);
  font-family:'Bebas Neue',cursive;
  font-size:1.2rem;
  width:32px;height:32px;
  cursor:pointer;
  transition:background 0.15s;
  display:flex;align-items:center;justify-content:center;
}
.round-nav button:hover{background:rgba(78,255,122,0.2);}
.round-nav button:disabled{opacity:0.3;cursor:default;}
.round-label{
  font-family:'Bebas Neue',cursive;
  font-size:1.15rem;
  letter-spacing:0.1em;
  color:var(--text);
  min-width:180px;
  text-align:center;
}
.round-status{
  font-size:0.68rem;
  letter-spacing:0.08em;
  text-transform:uppercase;
  padding:0.15rem 0.5rem;
  border-radius:4px;
  font-weight:600;
}
.round-status.completed{background:rgba(61,189,88,0.15);color:var(--win);}
.round-status.inprogress{background:rgba(240,224,64,0.15);color:var(--gold);}
.round-status.upcoming{background:rgba(122,173,128,0.1);color:var(--muted);}

/* ── TABS ── */
.lb-tabs{
  display:flex;
  gap:0;
  padding:0 1.5rem;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  background:var(--dark2);
}
.lb-tab{
  background:none;
  border:none;
  border-bottom:2px solid transparent;
  color:var(--muted);
  font-family:'Outfit',sans-serif;
  font-weight:600;
  font-size:0.8rem;
  letter-spacing:0.04em;
  padding:0.6rem 1rem;
  cursor:pointer;
  transition:all 0.15s;
  text-transform:uppercase;
  margin-bottom:-1px;
}
.lb-tab:hover{color:var(--accent);}
.lb-tab.active{color:var(--accent);border-bottom-color:var(--grass-bright);}

/* ── CONTENT ── */
.lb-body{flex:1;overflow-y:auto;padding:0;}
.lb-page{display:none;}
.lb-page.active{display:block;width:100%;}

/* ── TABLE ── */
.lb-table{width:100%;border-collapse:collapse;}
.lb-table th{
  background:var(--dark2);
  color:var(--muted);
  font-size:0.68rem;
  text-transform:uppercase;
  letter-spacing:0.08em;
  padding:0.55rem 0.9rem;
  text-align:left;
  font-weight:600;
  position:sticky;top:0;z-index:2;
  border-bottom:1px solid var(--border);
}
.lb-table th:not(:first-child){text-align:center;}
.lb-table td{padding:0.65rem 0.9rem;border-bottom:1px solid var(--border);vertical-align:middle;}
.lb-table td:not(:first-child){text-align:center;}
.lb-table tr:hover td{background:rgba(78,255,122,0.03);}

.rank-badge{
  display:inline-flex;align-items:center;justify-content:center;
  width:28px;height:28px;border-radius:50%;
  font-family:'Bebas Neue',cursive;font-size:1.05rem;
}
.rank-1{background:linear-gradient(135deg,#f0e040,#e6a817);color:#0a1f0e;}
.rank-2{background:#a8a9ad;color:#0a1f0e;}
.rank-3{background:#ad7b4b;color:#fff;}
.rank-n{background:transparent;color:var(--muted);border:1px solid var(--border);}

.badge-court{
  font-family:'Bebas Neue',cursive;
  font-size:0.82rem;
  background:rgba(78,255,122,0.1);
  color:var(--accent);
  border:1px solid var(--border);
  border-radius:4px;
  padding:0.1rem 0.45rem;
  letter-spacing:0.05em;
}

/* Movement */
.move-up{color:#4eff7a;font-size:1rem;}
.move-down{color:#e05050;font-size:1rem;}
.move-stay{color:#a0a0a0;font-size:1rem;}
.move-tbd{color:#7aad80;font-size:0.8rem;}

/* ── COURTS VIEW ── */
.courts-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:0.85rem;
  padding:1rem 1.5rem;
  width:100%;
  box-sizing:border-box;
}
.court-card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
}
.court-card-hdr{
  background:linear-gradient(135deg,var(--grass),var(--grass-light));
  padding:0.5rem 0.85rem;
  display:flex;align-items:center;justify-content:space-between;
}
.court-card-hdr.gold{background:linear-gradient(135deg,#8b7700,#b8a000);}
.court-name{font-family:'Bebas Neue',cursive;font-size:1.05rem;color:#fff;letter-spacing:0.06em;}
.court-body{padding:0.75rem;}
.team-row{
  display:flex;align-items:center;gap:0.5rem;
  padding:0.35rem 0;
  border-bottom:1px solid var(--border);
}
.team-row:last-child{border-bottom:none;}
.team-name{font-weight:600;font-size:0.85rem;flex:1;}
.team-players{font-size:0.7rem;color:var(--muted);}
.team-total{font-family:'Bebas Neue',cursive;font-size:1.2rem;color:var(--accent);}

.no-data{
  padding:2rem;
  text-align:center;
  color:var(--muted);
  font-size:0.9rem;
  line-height:1.7;
}
</style>
</head>
<body>

<div class="lb-header">
  <span style="font-size:1.5rem;filter:drop-shadow(0 0 6px rgba(78,255,122,0.5))">🎾</span>
  <div>
    <div class="lb-logo">Climb the Court</div>
    <span class="lb-logo-sub">Live Leaderboard</span>
  </div>
  <div class="lb-status">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">Connecting…</span>
  </div>
</div>

<!-- Round Navigation -->
<div class="round-nav" id="round-nav" style="display:none">
  <button id="btn-prev" onclick="changeRound(-1)">&#8592;</button>
  <span class="round-label" id="round-label">—</span>
  <span class="round-status" id="round-status-badge"></span>
  <button id="btn-next" onclick="changeRound(1)">&#8594;</button>
</div>

<div class="lb-tabs">
  <button class="lb-tab active" onclick="switchTab(1,this)">Standings</button>
  <button class="lb-tab" onclick="switchTab(2,this)">Courts</button>
  <button class="lb-tab" onclick="switchTab(3,this)">Results</button>
</div>

<div class="lb-body">
  <div class="lb-page active" id="p1">
    <table class="lb-table">
      <thead><tr>
        <th style="width:36px">#</th>
        <th>Team</th>
        <th>Players</th>
        <th>W</th><th>L</th>
        <th>Court</th>
        <th>Move</th>
        <th>Next</th>
        <th>Score</th>
      </tr></thead>
      <tbody id="tbody-standings"></tbody>
    </table>
  </div>

  <div class="lb-page" id="p2">
    <div class="courts-grid" id="courts-view"></div>
  </div>

  <div class="lb-page" id="p3">
    <table class="lb-table">
      <thead><tr>
        <th>Court</th>
        <th>Winner</th>
        <th>Loser</th>
        <th>Score</th>
      </tr></thead>
      <tbody id="tbody-results"></tbody>
    </table>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const CTC_KEY = 'ctc_live';
let S = null;           // full tournament state
let selectedRoundIdx = 0; // index into matchRounds array
let matchRounds = [];     // only 'match' type rounds (seeding excluded from round nav)
let allRounds = [];       // all rounds
let activeTab = 1;

// ── Utilities ──────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setStatus(ok, msg) {
  document.getElementById('status-dot').style.background = ok ? 'var(--win)' : 'var(--lose)';
  document.getElementById('status-text').textContent = msg;
}

// ── Tab switching ──────────────────────────────────────────────────────────
function switchTab(n, el) {
  document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('p1').classList.toggle('active', n===1);
  document.getElementById('p2').classList.toggle('active', n===2);
  document.getElementById('p3').classList.toggle('active', n===3);
  activeTab = n;
}

// ── Round navigation ───────────────────────────────────────────────────────
function changeRound(delta) {
  selectedRoundIdx = Math.max(0, Math.min(matchRounds.length - 1, selectedRoundIdx + delta));
  renderAll();
}

function updateRoundNav() {
  if (!S || matchRounds.length === 0) {
    document.getElementById('round-nav').style.display = 'none';
    return;
  }
  document.getElementById('round-nav').style.display = 'flex';

  const r = matchRounds[selectedRoundIdx];
  const seedCount = matchRounds.filter(x => x.type === 'seeding').length;
  const matchIdx = r.type === 'seeding' ? null : (selectedRoundIdx - seedCount + 1);
  const roundLabel = r.type === 'seeding' ? 'Seeding Round'
    : (r.label || ('Round ' + matchIdx));
  const navLabel = roundLabel + '  (' + (selectedRoundIdx + 1) + ' of ' + matchRounds.length + ')';
  document.getElementById('round-label').textContent = navLabel;

  const badge = document.getElementById('round-status-badge');
  if (r.completed) {
    badge.textContent = '✓ Completed';
    badge.className = 'round-status completed';
  } else {
    // check if any score entered
    const hasScores = r.fixtures && r.fixtures.some(f =>
      f.scores && (f.scores.p1a !== '' || f.scores.p2a !== '')
    );
    badge.textContent = hasScores ? '⏳ In Progress' : 'Upcoming';
    badge.className = 'round-status ' + (hasScores ? 'inprogress' : 'upcoming');
  }

  document.getElementById('btn-prev').disabled = (selectedRoundIdx === 0);
  document.getElementById('btn-next').disabled = (selectedRoundIdx === matchRounds.length - 1);
}

// ── Team court in a given match round ─────────────────────────────────────
function teamCourtInRound(teamId, round) {
  if (!round) return null;
  // Seeding round stores court data in courtAssignments, not fixtures
  if (round.type === 'seeding' && round.courtAssignments) {
    for (const ca of round.courtAssignments) {
      if (ca.team1id === teamId || ca.team2id === teamId) return ca.courtNum;
    }
  }
  if (!round.fixtures) return null;
  for (const f of round.fixtures) {
    if (f.team1id === teamId || f.team2id === teamId) return f.courtNum ?? null;
  }
  return null;
}

// ── Movement arrow ─────────────────────────────────────────────────────────
function movementArrow(curCourt, prevCourt) {
  if (prevCourt === null) return '<span class="move-tbd">❓</span>';
  if (curCourt < prevCourt) return '<span class="move-up">🔼</span>';
  if (curCourt > prevCourt) return '<span class="move-down">🔽</span>';
  return '<span class="move-stay">⏸️</span>';
}

// ── Standings ──────────────────────────────────────────────────────────────
function computeStandingsUpTo(roundIdx) {
  const numCourts = S.numPlayers / 4;
  const stats = S.teams.map((t, i) => ({
    tid: i,
    wins: 0,
    losses: 0,
    totalScore: 0,
    court: numCourts // default = bottom court
  }));

  matchRounds.forEach((r, idx) => {
    if (idx > roundIdx) return;  // only up to selected round
    if (!r.completed) return;
    if (r.type === 'seeding') return; // seeding doesn't count wins/losses
    r.fixtures.forEach(f => {
      if (!f.result) return;
      const wi = stats.findIndex(x => x.tid === f.result.winner);
      const li = stats.findIndex(x => x.tid === f.result.loser);

      if (wi >= 0) {
        stats[wi].wins++;
        stats[wi].court = f.courtNum; // winner stays on their court
      }
      if (li >= 0) {
        stats[li].losses++;
        stats[li].court = f.courtNum; // loser was on this court
      }

      const addScore = (tid, a, b) => {
        const st = stats.find(x => x.tid === tid);
        if (st) st.totalScore += (parseInt(a)||0) + (parseInt(b)||0);
      };
      addScore(f.team1id, f.scores.p1a, f.scores.p1b);
      addScore(f.team2id, f.scores.p2a, f.scores.p2b);
    });
  });

  stats.sort((a, b) => a.court - b.court || b.wins - a.wins || b.totalScore - a.totalScore);
  return stats;
}

function renderStandings() {
  const roundIdx = selectedRoundIdx;
  const curRound = matchRounds[roundIdx];

  // If seeding round selected, show seeding-specific table
  if (curRound && curRound.type === 'seeding') {
    renderSeedingStandings(curRound);
    return;
  }

  const stats = computeStandingsUpTo(roundIdx);
  const prevStats = roundIdx > 0 ? computeStandingsUpTo(roundIdx - 1) : null;

  let html = '';
  stats.forEach((st, i) => {
    const rank = i + 1;
    const cls = rank <= 3 ? 'rank-' + rank : 'rank-n';
    const t = S.teams[st.tid];
    const p1 = S.players[t.p1id];
    const p2 = S.players[t.p2id];

    // Court: show actual court from the selected round's fixtures
    const curCourt = teamCourtInRound(st.tid, curRound) || st.court;

    // Individual scores for this round's fixture
    let p1score = null, p2score = null;
    if (curRound && curRound.fixtures) {
      const fix = curRound.fixtures.find(f => f.team1id === st.tid || f.team2id === st.tid);
      if (fix) {
        const isT1 = fix.team1id === st.tid;
        const sa = isT1 ? fix.scores.p1a : fix.scores.p2a;
        const sb = isT1 ? fix.scores.p1b : fix.scores.p2b;
        if (sa !== '' || sb !== '') { p1score = parseInt(sa)||0; p2score = parseInt(sb)||0; }
      }
    }
    const p1cell = esc(p1.name) + (p1score !== null ? ` <span style="color:var(--gold);font-weight:700">(${p1score})</span>` : '');
    const p2cell = esc(p2.name) + (p2score !== null ? ` <span style="color:var(--gold);font-weight:700">(${p2score})</span>` : '');

    // Movement: same logic as index.html Movement tab
    let move = '<span class="move-tbd">❓</span>';
    let nextCourtCell = '<span style="color:var(--muted)">—</span>';
    if (curRound && curRound.type === 'match') {
      const numCourts = S.numPlayers / 4;
      const fix = curRound.fixtures
        ? curRound.fixtures.find(f => f.team1id === st.tid || f.team2id === st.tid)
        : null;
      if (fix && fix.result) {
        const isWinner = fix.result.winner === st.tid;
        const fc = fix.courtNum;
        if (isWinner) {
          const next = Math.max(1, fc - 1);
          move = next < fc
            ? '<span class="move-up">🔼</span>'
            : '<span class="move-stay">⏸️</span>';
          nextCourtCell = `<span class="badge-court">C${next}</span>`;
        } else {
          const next = Math.min(numCourts, fc + 1);
          move = next > fc
            ? '<span class="move-down">🔽</span>'
            : '<span class="move-stay">⏸️</span>';
          nextCourtCell = `<span class="badge-court">C${next}</span>`;
        }
      }
    }

    html += `<tr>
      <td><span class="rank-badge ${cls}">${rank}</span></td>
      <td><strong>${esc(t.name)}</strong></td>
      <td style="font-size:1rem;color:#fff;font-weight:700">${p1cell} <span style="color:var(--muted)">&amp;</span> ${p2cell}</td>
      <td><span style="color:var(--win);font-weight:700">${st.wins}</span></td>
      <td><span style="color:var(--lose)">${st.losses}</span></td>
      <td><span class="badge-court">C${curCourt}</span></td>
      <td>${move}</td>
      <td>${nextCourtCell}</td>
      <td style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--accent)">${st.totalScore}</td>
    </tr>`;
  });

  document.getElementById('tbody-standings').innerHTML = html ||
    '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:1.5rem">No completed rounds yet</td></tr>';
}

// ── Seeding Standings ─────────────────────────────────────────────────────
function renderSeedingStandings(seedRound) {
  // Collect all teams with their seeding scores
  const rows = [];
  if (seedRound && seedRound.fixtures) {
    seedRound.fixtures.forEach(f => {
      const addTeam = (tid, sa, sb) => {
        const score = (parseInt(sa)||0) + (parseInt(sb)||0);
        rows.push({ tid, sa, sb, score });
      };
      addTeam(f.team1id, f.scores.p1a, f.scores.p1b);
      addTeam(f.team2id, f.scores.p2a, f.scores.p2b);
    });
  }
  rows.sort((a, b) => b.score - a.score);

  if (!seedRound.completed) {
    // Show in-progress seeding scores
    let html = '';
    rows.forEach((row, i) => {
      const t = S.teams[row.tid];
      const p1 = S.players[t.p1id], p2 = S.players[t.p2id];
      const cls = i < 3 ? 'rank-' + (i+1) : 'rank-n';
      const hasScores = row.sa !== '' || row.sb !== '';
      const p1Score = hasScores ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(row.sa)||0})</span>` : '';
      const p2Score = hasScores ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(row.sb)||0})</span>` : '';
      html += `<tr>
        <td><span class="rank-badge ${cls}">${i+1}</span></td>
        <td><strong>${esc(t.name)}</strong></td>
        <td style="font-size:1rem;color:#fff;font-weight:700">${esc(p1.name)}${p1Score} <span style="color:var(--muted)">&amp;</span> ${esc(p2.name)}${p2Score}</td>
        <td colspan="4" style="color:var(--muted);font-style:italic">Seeding in progress</td>
        <td style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--accent)">${row.score}</td>
      </tr>`;
    });
    document.getElementById('tbody-standings').innerHTML = html ||
      '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:1.5rem">No seeding data yet</td></tr>';
  } else {
    // Court assignments from seeding
    let courtMap = {};
    if (seedRound.courtAssignments) {
      seedRound.courtAssignments.forEach(ca => {
        courtMap[ca.team1id] = ca.courtNum;
        courtMap[ca.team2id] = ca.courtNum;
      });
    }
    let html = '';
    rows.forEach((row, i) => {
      const t = S.teams[row.tid];
      const p1 = S.players[t.p1id], p2 = S.players[t.p2id];
      const cls = i < 3 ? 'rank-' + (i+1) : 'rank-n';
      const court = courtMap[row.tid] || '—';
      const hasScores = row.sa !== '' || row.sb !== '';
      const p1Score = hasScores ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(row.sa)||0})</span>` : '';
      const p2Score = hasScores ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(row.sb)||0})</span>` : '';
      html += `<tr>
        <td><span class="rank-badge ${cls}">${i+1}</span></td>
        <td><strong>${esc(t.name)}</strong></td>
        <td style="font-size:1rem;color:#fff;font-weight:700">${esc(p1.name)}${p1Score} <span style="color:var(--muted)">&amp;</span> ${esc(p2.name)}${p2Score}</td>
        <td>—</td><td>—</td>
        <td><span class="badge-court">C${court}</span></td>
        <td>—</td>
        <td>—</td>
        <td style="font-family:'Bebas Neue',cursive;font-size:1.1rem;color:var(--accent)">${row.score}</td>
      </tr>`;
    });
    document.getElementById('tbody-standings').innerHTML = html ||
      '<tr><td colspan="9" style="text-align:center;color:var(--muted);padding:1.5rem">No seeding data yet</td></tr>';
  }
}

// ── Courts ─────────────────────────────────────────────────────────────────
function renderCourts() {
  const round = matchRounds[selectedRoundIdx];
  if (!round || !round.fixtures) {
    document.getElementById('courts-view').innerHTML = '<div class="no-data">No court data for this round.</div>';
    return;
  }
  // Seeding round: show all teams with their scores (no head-to-head court layout)
  if (round.type === 'seeding') {
    renderSeedingCourts(round);
    return;
  }

  let html = '';
  round.fixtures.forEach(f => {
    const t1 = S.teams[f.team1id], t2 = S.teams[f.team2id];
    const p1a = S.players[t1.p1id], p1b = S.players[t1.p2id];
    const p2a = S.players[t2.p1id], p2b = S.players[t2.p2id];
    const t1tot = (parseInt(f.scores.p1a)||0) + (parseInt(f.scores.p1b)||0);
    const t2tot = (parseInt(f.scores.p2a)||0) + (parseInt(f.scores.p2b)||0);
    const hasT1 = f.scores.p1a !== '' || f.scores.p1b !== '';
    const hasT2 = f.scores.p2a !== '' || f.scores.p2b !== '';
    const p1aScore = hasT1 ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(f.scores.p1a)||0})</span>` : '';
    const p1bScore = hasT1 ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(f.scores.p1b)||0})</span>` : '';
    const p2aScore = hasT2 ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(f.scores.p2a)||0})</span>` : '';
    const p2bScore = hasT2 ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(f.scores.p2b)||0})</span>` : '';
    const label = `Court ${f.courtNum}`;
    const isTop = f.courtNum === 1;

    html += `<div class="court-card">
      <div class="court-card-hdr ${isTop ? 'gold' : ''}">
        <span class="court-name">${label}</span>
        ${isTop ? '<span style="font-size:0.65rem;color:rgba(255,255,255,0.8)">🏆 TOP</span>' : ''}
      </div>
      <div class="court-body">
        <div class="team-row">
          <div style="flex:1">
            <div class="team-name">${esc(t1.name)}</div>
            <div class="team-players" style="color:#fff;font-weight:700;font-size:0.88rem">${esc(p1a.name)}${p1aScore} <span style="color:var(--muted)">&amp;</span> ${esc(p1b.name)}${p1bScore}</div>
          </div>
          <div class="team-total">${hasT1 ? t1tot : '—'}</div>
        </div>
        <div class="team-row">
          <div style="flex:1">
            <div class="team-name">${esc(t2.name)}</div>
            <div class="team-players" style="color:#fff;font-weight:700;font-size:0.88rem">${esc(p2a.name)}${p2aScore} <span style="color:var(--muted)">&amp;</span> ${esc(p2b.name)}${p2bScore}</div>
          </div>
          <div class="team-total">${hasT2 ? t2tot : '—'}</div>
        </div>
        ${f.result ? `<div style="text-align:center;margin-top:0.5rem;font-family:'Bebas Neue',cursive;font-size:0.9rem;color:var(--win)">✓ ${esc(S.teams[f.result.winner].name)} Win</div>` : ''}
      </div>
    </div>`;
  });

  document.getElementById('courts-view').innerHTML = html;
}

// ── Seeding Courts View ────────────────────────────────────────────────────
function renderSeedingCourts(seedRound) {
  const el = document.getElementById('courts-view');
  if (!seedRound || !seedRound.fixtures) {
    el.innerHTML = '<div class="no-data">No seeding data available.</div>';
    return;
  }
  // Collect all teams with scores
  const rows = [];
  seedRound.fixtures.forEach(f => {
    [
      { tid: f.team1id, sa: f.scores.p1a, sb: f.scores.p1b },
      { tid: f.team2id, sa: f.scores.p2a, sb: f.scores.p2b }
    ].forEach(({ tid, sa, sb }) => {
      const t = S.teams[tid];
      const p1 = S.players[t.p1id], p2 = S.players[t.p2id];
      const score = sa !== '' || sb !== '' ? (parseInt(sa)||0) + (parseInt(sb)||0) : null;
      const saScore = sa !== '' ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(sa)||0})</span>` : '';
      const sbScore = sb !== '' ? ` <span style="color:var(--gold);font-weight:700">(${parseInt(sb)||0})</span>` : '';
      rows.push({ t, p1, p2, sa, sb, saScore, sbScore, score });
    });
  });
  rows.sort((a, b) => (b.score||0) - (a.score||0));

  let html = '<div class="courts-grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">';
  rows.forEach((row, i) => {
    html += `<div class="court-card">
      <div class="court-card-hdr" style="background:var(--grass-light)">
        <span class="court-name">Seed #${i+1}</span>
      </div>
      <div class="court-body">
        <div class="team-row">
          <div style="flex:1">
            <div class="team-name">${esc(row.t.name)}</div>
            <div class="team-players" style="color:#fff;font-weight:700;font-size:0.88rem">${esc(row.p1.name)}${row.saScore} <span style="color:var(--muted)">&amp;</span> ${esc(row.p2.name)}${row.sbScore}</div>
          </div>
          <div class="team-total">${row.score !== null ? row.score : '—'}</div>
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── Results ────────────────────────────────────────────────────────────────
function renderResults() {
  const round = matchRounds[selectedRoundIdx];
  if (!round || !round.completed) {
    document.getElementById('tbody-results').innerHTML =
      '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1.5rem">No results for this round yet</td></tr>';
    return;
  }
  // Seeding round: show seeding scores sorted
  if (round.type === 'seeding') {
    const rows = [];
    round.fixtures.forEach(f => {
      [
        { tid: f.team1id, sa: f.scores.p1a, sb: f.scores.p1b },
        { tid: f.team2id, sa: f.scores.p2a, sb: f.scores.p2b }
      ].forEach(({ tid, sa, sb }) => {
        const score = (parseInt(sa)||0) + (parseInt(sb)||0);
        rows.push({ t: S.teams[tid], score });
      });
    });
    rows.sort((a, b) => b.score - a.score);
    let html = '';
    rows.forEach((row, i) => {
      html += `<tr>
        <td><span class="rank-badge ${i < 3 ? 'rank-'+(i+1) : 'rank-n'}">${i+1}</span></td>
        <td style="color:var(--win);font-weight:600">${esc(row.t.name)}</td>
        <td style="color:var(--muted)">Seeding score</td>
        <td style="font-family:'Bebas Neue',cursive;color:var(--accent)">${row.score}</td>
      </tr>`;
    });
    document.getElementById('tbody-results').innerHTML = html ||
      '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1.5rem">No seeding data</td></tr>';
    return;
  }

  let html = '';
  round.fixtures.forEach(f => {
    if (!f.result) return;
    const winner = S.teams[f.result.winner];
    const loser  = S.teams[f.result.loser];
    const t1tot = (parseInt(f.scores.p1a)||0) + (parseInt(f.scores.p1b)||0);
    const t2tot = (parseInt(f.scores.p2a)||0) + (parseInt(f.scores.p2b)||0);
    const wTot = f.result.winner === f.team1id ? t1tot : t2tot;
    const lTot = f.result.loser  === f.team1id ? t1tot : t2tot;
    html += `<tr>
      <td><span class="badge-court">C${f.courtNum}</span></td>
      <td style="color:var(--win);font-weight:600">${esc(winner.name)}</td>
      <td style="color:var(--muted)">${esc(loser.name)}</td>
      <td style="font-family:'Bebas Neue',cursive;color:var(--accent)">${wTot} – ${lTot}</td>
    </tr>`;
  });

  document.getElementById('tbody-results').innerHTML = html ||
    '<tr><td colspan="4" style="text-align:center;color:var(--muted);padding:1.5rem">No results yet</td></tr>';
}

// ── Master render ──────────────────────────────────────────────────────────
function renderAll() {
  if (!S || !S.launched) return;
  updateRoundNav();
  renderStandings();
  renderCourts();
  renderResults();
}

// ── Data loading ───────────────────────────────────────────────────────────
function applyState(state) {
  if (!state || !state.launched) {
    setStatus(false, 'No active tournament');
    return;
  }
  S = state;

  // Build rounds list (include seeding as round 0 if present)
  allRounds = S.rounds || [];
  const seedingRounds = allRounds.filter(r => r.type === 'seeding');
  const onlyMatchRounds = allRounds.filter(r => r.type === 'match');
  matchRounds = [...seedingRounds, ...onlyMatchRounds];

  // Auto-select most recent started round
  let autoIdx = 0;
  matchRounds.forEach((r, i) => {
    const hasData = r.completed || (r.fixtures && r.fixtures.some(f =>
      f.scores && (f.scores.p1a !== '' || f.scores.p2a !== '')
    ));
    if (hasData) autoIdx = i;
  });

  // Only auto-advance if we haven't manually selected
  if (!window._roundPinned) selectedRoundIdx = autoIdx;

  renderAll();
  setStatus(true, 'Live · ' + new Date().toLocaleTimeString());
}

// Broadcast Channel listener
const _bc = new BroadcastChannel('ctc_live');
_bc.onmessage = e => {
  if (e.data && e.data.type === 'state_update') applyState(e.data.state);
};

// Initial load from localStorage
function loadFromStorage() {
  try {
    const raw = localStorage.getItem('ctc_live');
    if (raw) applyState(JSON.parse(raw));
    else setStatus(false, 'Waiting for tournament data — open index.html first');
  } catch(e) {
    setStatus(false, 'Error reading data');
  }
}

// Override changeRound to pin selection
const _origChange = changeRound;
window.changeRound = function(delta) {
  window._roundPinned = true;
  selectedRoundIdx = Math.max(0, Math.min(matchRounds.length - 1, selectedRoundIdx + delta));
  renderAll();
};

loadFromStorage();
// Fallback poll every 3 seconds
setInterval(() => {
  const raw = localStorage.getItem('ctc_live');
  if (raw) { try { applyState(JSON.parse(raw)); } catch(e){} }
}, 3000);
</script>
